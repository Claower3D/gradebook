<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — АттестатПро</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d3d;
  --border:#2d3a50;--border2:#3a4a65;
  --text:#e8edf5;--text2:#8fa3c0;--text3:#566a85;
  --blue:#4a90d9;--blue2:#2c6fad;
  --green:#3db87a;--green2:#2a8a5a;--red:#e05050;--purple:#8b6fce;--amber:#e8a030;
}
html,body{min-height:100%;background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--text)}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
  background:radial-gradient(ellipse at 80% 70%, #1a2540 0%, var(--bg) 60%)}
.card{
  width:460px;background:var(--bg2);border:1px solid var(--border);
  border-radius:18px;padding:44px 40px;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.card-header{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.back-btn{
  width:36px;height:36px;border:1px solid var(--border2);border-radius:8px;background:none;
  color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;flex-shrink:0;
}
.back-btn:hover{background:var(--bg3);color:var(--text)}
.card-header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.card-header p{font-size:13px;color:var(--text2);margin-top:2px}

.role-display{
  display:flex;align-items:center;gap:10px;
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:24px;
}
.role-icon{font-size:20px}
.role-name{font-size:14px;font-weight:600;color:var(--text)}
.role-desc{font-size:12px;color:var(--text2)}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.form-group input, .form-group select{
  width:100%;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:.2s;
}
.form-group input:focus,.form-group select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(74,144,217,.12)}
.form-group input::placeholder{color:var(--text3)}
select option{background:var(--bg3)}

.pass-strength{height:3px;border-radius:2px;margin-top:6px;background:var(--bg4);overflow:hidden}
.pass-strength-bar{height:100%;transition:.3s;border-radius:2px}

.info-box{
  background:rgba(74,144,217,.08);border:1px solid rgba(74,144,217,.2);
  border-radius:8px;padding:10px 13px;font-size:12px;color:var(--text2);margin-bottom:18px;
}
.info-box b{color:var(--blue)}

.btn{
  width:100%;padding:13px;border:none;border-radius:9px;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  transition:.2s;letter-spacing:.3px;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(61,184,122,.35)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;pointer-events:none}

.err{
  background:rgba(224,80,80,.1);border:1px solid rgba(224,80,80,.3);border-radius:7px;
  padding:10px 13px;font-size:13px;color:#f08080;margin-bottom:14px;display:none;
}
.err.show{display:block}
.success-overlay{
  display:none;text-align:center;padding:20px 0;
}
.success-overlay.show{display:block}
.success-icon{font-size:52px;margin-bottom:16px}
.success-overlay h2{font-size:20px;font-weight:700;margin-bottom:8px}
.success-overlay p{font-size:14px;color:var(--text2)}

.parent-link{
  background:rgba(232,160,48,.08);border:1px solid rgba(232,160,48,.2);
  border-radius:8px;padding:12px;margin-top:14px;display:none;
}
.parent-link.show{display:block}
.parent-link label{font-size:11px;color:var(--amber);font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:6px}
.parent-link input{
  width:100%;padding:9px 12px;background:var(--bg3);border:1px solid rgba(232,160,48,.3);
  border-radius:6px;color:var(--text);font-size:13px;outline:none;
}
</style>
</head>
<body>
<div class="card">
  <div id="form-section">
    <div class="card-header">
      <button class="back-btn" onclick="history.back()">←</button>
      <div>
        <h1>Регистрация</h1>
        <p>Создайте аккаунт в системе</p>
      </div>
    </div>

    <div class="role-display" id="role-display">
      <span class="role-icon" id="role-icon">🧑‍🎓</span>
      <div>
        <div class="role-name" id="role-name">Ученик</div>
        <div class="role-desc" id="role-desc">Просмотр своих оценок</div>
      </div>
    </div>

    <div class="err" id="err"></div>

    <div class="form-group">
      <label>Имя и фамилия</label>
      <input type="text" id="name" placeholder="Иванов Иван Иванович" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Логин</label>
        <input type="text" id="login" placeholder="ivanov_ivan" autocomplete="username" />
      </div>
      <div id="class-group" class="form-group" style="display:none">
        <label>Класс</label>
        <select id="class">
          <option value="9А">9А</option>
          <option value="9Б">9Б</option>
          <option value="10А">10А</option>
          <option value="10Б">10Б</option>
          <option value="11А">11А</option>
          <option value="11Б">11Б</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="Минимум 4 символа" autocomplete="new-password"
        oninput="checkStrength(this.value)" />
      <div class="pass-strength"><div class="pass-strength-bar" id="strength-bar"></div></div>
    </div>
    <div class="form-group">
      <label>Повторите пароль</label>
      <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')doRegister()" />
    </div>

    <div class="parent-link" id="parent-link">
      <label>Логин вашего ребёнка (ученика)</label>
      <input type="text" id="child-login" placeholder="Введите логин ученика" />
    </div>

    <div class="info-box" id="info-box">
      Учитель сможет добавить вас в систему. <b>Запомните логин</b> — он понадобится для входа.
    </div>

    <button class="btn" id="reg-btn" onclick="doRegister()">Создать аккаунт</button>
  </div>

  <div class="success-overlay" id="success">
    <div class="success-icon">🎉</div>
    <h2>Аккаунт создан!</h2>
    <p>Перенаправление на вход...</p>
  </div>
</div>

<script>
const API = '';
const params = new URLSearchParams(location.search);
let role = params.get('role') || 'student';

const roleInfo = {
  student: {icon:'🧑‍🎓', name:'Ученик', desc:'Просмотр своих оценок'},
  parent:  {icon:'👨‍👧', name:'Родитель', desc:'Просмотр оценок ребёнка'},
};

function init() {
  const info = roleInfo[role] || roleInfo.student;
  document.getElementById('role-icon').textContent = info.icon;
  document.getElementById('role-name').textContent = info.name;
  document.getElementById('role-desc').textContent = info.desc;
  if (role === 'student') {
    document.getElementById('class-group').style.display = '';
    document.getElementById('form-row-class').style.display = '';
  }
  if (role === 'parent') {
    document.getElementById('parent-link').classList.add('show');
    document.getElementById('info-box').innerHTML = 'После регистрации вы увидите оценки ребёнка. <b>Введите логин ученика</b> для привязки.';
  }
  // make form-row responsive
  if (role === 'student') {
    document.getElementById('class-group').style.display = 'block';
  }
}

function checkStrength(pw) {
  const bar = document.getElementById('strength-bar');
  let strength = 0;
  if (pw.length >= 4) strength++;
  if (pw.length >= 8) strength++;
  if (/[A-ZА-ЯЁ]/.test(pw)) strength++;
  if (/[0-9]/.test(pw)) strength++;
  const colors = ['','#e05050','#e8a030','#4a90d9','#3db87a'];
  const widths = [0, 25, 50, 75, 100];
  bar.style.width = widths[strength] + '%';
  bar.style.background = colors[strength];
}

async function doRegister() {
  const name = document.getElementById('name').value.trim();
  const login = document.getElementById('login').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const classVal = document.getElementById('class')?.value || '';
  const childLogin = document.getElementById('child-login')?.value.trim() || '';
  const err = document.getElementById('err');
  err.classList.remove('show');

  if (!name || !login || !password) { showErr('Заполните все поля'); return; }
  if (password !== password2) { showErr('Пароли не совпадают'); return; }
  if (password.length < 4) { showErr('Пароль минимум 4 символа'); return; }

  const btn = document.getElementById('reg-btn');
  btn.textContent = 'Создание...'; btn.disabled = true;

  try {
    const body = { login, password, name, role };
    if (role === 'student') body.class = classVal;

    const res = await fetch(API + '/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!data.success) { showErr(data.error); return; }

    const token = data.data.token;
    const user = data.data.user;
    localStorage.setItem('gb_token', token);
    localStorage.setItem('gb_user', JSON.stringify(user));

    // link child if parent
    if (role === 'parent' && childLogin) {
      await fetch(API + '/api/link-child', {
        method: 'POST',
        headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
        body: JSON.stringify({student_login: childLogin})
      });
    }

    document.getElementById('form-section').style.display = 'none';
    document.getElementById('success').classList.add('show');
    setTimeout(() => window.location.href = '/app.html', 1800);
  } catch(e) {
    showErr('Ошибка подключения к серверу');
  } finally {
    btn.textContent = 'Создать аккаунт'; btn.disabled = false;
  }
}

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.classList.add('show');
}

init();
</script>
</body>
</html>
