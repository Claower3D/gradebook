<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АттестатПро</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d3d;
  --border:#2d3a50;--border2:#3a4a65;
  --text:#e8edf5;--text2:#8fa3c0;--text3:#566a85;
  --blue:#4a90d9;--blue2:#2c6fad;--blue3:rgba(74,144,217,.12);
  --green:#3db87a;--green2:#2a8a5a;
  --amber:#e8a030;--red:#e05050;--purple:#8b6fce;
}
html,body{min-height:100%;background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--text)}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:60px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
}
.topbar-brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--blue2),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px}
.brand-name{font-size:16px;font-weight:800;letter-spacing:-.5px}
.topbar-right{display:flex;align-items:center;gap:10px}
.role-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px}
.pill-teacher{background:rgba(139,111,206,.2);color:#c0a8f0;border:1px solid rgba(139,111,206,.3)}
.pill-student{background:rgba(61,184,122,.2);color:#70d4a0;border:1px solid rgba(61,184,122,.3)}
.pill-parent{background:rgba(232,160,48,.2);color:#f0c070;border:1px solid rgba(232,160,48,.3)}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.logout-btn{padding:6px 14px;background:none;border:1px solid var(--border2);border-radius:7px;color:var(--text2);font-size:12px;cursor:pointer;transition:.15s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* LAYOUT */
.app-layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{
  width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  padding:16px 12px;
}
.sidebar-section{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:6px 8px;margin-bottom:4px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;
  color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;border:none;background:none;width:100%;text-align:left;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--blue3);color:var(--blue);font-weight:600}
.nav-item .ni{font-size:15px;width:20px;text-align:center}

.main{flex:1;padding:24px;overflow:auto;max-width:900px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.stat .lbl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.stat .val{font-size:28px;font-weight:800;line-height:1;color:var(--text)}
.stat .sub{font-size:11px;color:var(--text2);margin-top:4px}

/* SCHEDULE STRIP */
.schedule-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:20px;scrollbar-width:thin}
.day-btn{
  flex-shrink:0;min-width:64px;padding:8px 10px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;transition:.15s;text-align:center;
}
.day-btn .wd{font-weight:700;font-size:12px;margin-bottom:2px}
.day-btn .dd{font-size:15px;font-weight:800}
.day-btn .mo{font-size:10px;opacity:.7}
.day-btn .cnt{font-size:10px;margin-top:3px}
.day-btn.active{background:linear-gradient(135deg,var(--blue2),#1a4a7a);color:#fff;border-color:transparent}
.day-btn.today:not(.active){border-color:var(--blue);color:var(--blue)}

/* TABLE */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);
}
.panel-title{font-size:14px;font-weight:700}
.panel-sub{font-size:12px;color:var(--text2);margin-top:1px}
table{width:100%;border-collapse:collapse}
th{padding:9px 16px;font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:var(--bg3);border-bottom:1px solid var(--border);text-align:left}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}

.student-cell{display:flex;align-items:center;gap:10px}
.s-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

.g-select{
  width:64px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:13px;font-weight:700;cursor:pointer;outline:none;transition:.15s;
}
.g-select:focus{border-color:var(--blue)}
.g-input{
  flex:1;padding:6px 9px;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:12px;outline:none;transition:.15s;
}
.g-input:focus{border-color:var(--blue)}
.g-input::placeholder{color:var(--text3)}
.save-btn{padding:5px 12px;background:var(--green2);border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}
.save-btn:hover{background:var(--green)}
.del-btn{padding:5px 8px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:11px;cursor:pointer;transition:.15s}
.del-btn:hover{border-color:var(--red);color:var(--red)}

.grade-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:7px;font-size:14px;font-weight:800}
.gb-5{background:rgba(61,184,122,.18);color:#6dd8a4;border:1px solid rgba(61,184,122,.3)}
.gb-4{background:rgba(74,144,217,.18);color:#7ab8f0;border:1px solid rgba(74,144,217,.3)}
.gb-3{background:rgba(232,160,48,.18);color:#f0c070;border:1px solid rgba(232,160,48,.3)}
.gb-2{background:rgba(224,80,80,.18);color:#f09090;border:1px solid rgba(224,80,80,.3)}

.avg-chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700}

.save-all-btn{
  padding:9px 18px;background:linear-gradient(135deg,var(--blue),var(--blue2));border:none;
  border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;
}
.save-all-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(74,144,217,.4)}

/* GRADES GRID (student/parent view) */
.grades-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.g-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.g-card .g-date{font-size:11px;color:var(--text3);margin-bottom:8px}
.g-card .g-val{font-size:34px;font-weight:900;line-height:1}
.g-card .g-cmt{font-size:11px;color:var(--text2);margin-top:4px;font-style:italic}
.g-card.no-grade .g-val{font-size:26px;color:var(--text3)}

/* TOAST */
.toast{
  position:fixed;bottom:20px;right:20px;padding:11px 16px;
  background:var(--bg4);border:1px solid var(--border2);border-radius:10px;
  font-size:13px;font-weight:500;
  transform:translateY(60px);opacity:0;transition:.25s;z-index:9999;
  display:flex;align-items:center;gap:8px;max-width:320px;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--green2);color:var(--green)}
.toast.er{border-color:var(--red);color:#f09090}

/* LINK CHILD FORM */
.link-form{display:flex;gap:8px;margin-bottom:16px}
.link-input{flex:1;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none}
.link-input:focus{border-color:var(--amber)}
.link-btn{padding:9px 16px;background:rgba(232,160,48,.2);border:1px solid rgba(232,160,48,.3);border-radius:7px;color:var(--amber);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.link-btn:hover{background:rgba(232,160,48,.3)}

.empty{padding:40px;text-align:center;color:var(--text3);font-size:14px}
.empty .ei{font-size:32px;margin-bottom:10px;opacity:.4}

.child-tabs{display:flex;gap:6px;margin-bottom:16px}
.child-tab{padding:6px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:.15s}
.child-tab.active{background:var(--blue3);border-color:rgba(74,144,217,.3);color:var(--blue)}

@media(max-width:700px){
  .sidebar{display:none}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .grades-grid{grid-template-columns:repeat(2,1fr)}
  .main{padding:14px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">🎓</div>
    <span class="brand-name">АттестатПро</span>
  </div>
  <div class="topbar-right">
    <span class="role-pill" id="role-pill"></span>
    <div class="avatar" id="user-avatar"></div>
    <span style="font-size:13px;color:var(--text2)" id="user-name"></span>
    <button class="logout-btn" onclick="logout()">Выйти</button>
  </div>
</div>

<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main-content"></main>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let token = localStorage.getItem('gb_token');
let user = JSON.parse(localStorage.getItem('gb_user') || 'null');
let schedule = [];
let students = [];
let grades = {};        // {date: [{...}]}
let allGrades = [];
let myGrades = [];
let children = [];
let selectedDate = '';
let selectedChildId = null;
let currentView = 'grades';

if (!token || !user) { window.location.href = '/login.html'; }

async function apiFetch(path, opts={}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token, ...(opts.headers||{}) }
  });
  const data = await res.json();
  if (res.status === 401) { logout(); return null; }
  return data;
}

function logout() {
  localStorage.removeItem('gb_token');
  localStorage.removeItem('gb_user');
  window.location.href = '/login.html';
}

// ---- INIT ----
async function init() {
  // topbar
  document.getElementById('user-name').textContent = user.name.split(' ')[0];
  const rp = document.getElementById('role-pill');
  const rmap = {teacher:'Учитель',student:'Ученик',parent:'Родитель'};
  rp.textContent = rmap[user.role];
  rp.className = 'role-pill pill-' + user.role;
  const av = document.getElementById('user-avatar');
  const initials = user.name.split(' ').slice(0,2).map(s=>s[0]).join('');
  av.textContent = initials;
  const colors = {teacher:'#8b6fce',student:'#4a90d9',parent:'#e8a030'};
  av.style.background = colors[user.role] + '33';
  av.style.color = colors[user.role];

  // sidebar
  renderSidebar();

  // load schedule
  const sch = await apiFetch('/api/schedule');
  if (sch?.success) schedule = sch.data;
  const today = new Date().toISOString().split('T')[0];
  selectedDate = schedule.find(d => d.date >= today)?.date || schedule[0]?.date || '';

  if (user.role === 'teacher') {
    await loadTeacherData();
    renderTeacherView();
  } else if (user.role === 'student') {
    await loadStudentData();
    renderStudentView();
  } else {
    await loadParentData();
    renderParentView();
  }
}

function renderSidebar() {
  const nav = document.getElementById('sidebar');
  const items = {
    teacher: [
      {id:'grades', icon:'📋', label:'Журнал оценок'},
      {id:'stats',  icon:'📊', label:'Статистика'},
      {id:'students',icon:'👥',label:'Ученики'},
    ],
    student: [
      {id:'grades', icon:'📋', label:'Мои оценки'},
      {id:'stats',  icon:'📊', label:'Успеваемость'},
    ],
    parent: [
      {id:'grades', icon:'📋', label:'Оценки ребёнка'},
      {id:'children', icon:'👧', label:'Дети'},
    ],
  };
  const role = user.role;
  nav.innerHTML = `<div class="sidebar-section">Навигация</div>` +
    (items[role]||[]).map(i =>
      `<button class="nav-item${currentView===i.id?' active':''}" onclick="switchView('${i.id}')">
        <span class="ni">${i.icon}</span>${i.label}
      </button>`
    ).join('');
}

function switchView(view) {
  currentView = view;
  renderSidebar();
  if (user.role === 'teacher') renderTeacherView();
  else if (user.role === 'student') renderStudentView();
  else renderParentView();
}

// ---- TEACHER ----
async function loadTeacherData() {
  const [s, g] = await Promise.all([
    apiFetch('/api/students'),
    apiFetch('/api/grades/all'),
  ]);
  if (s?.success) students = s.data || [];
  if (g?.success) allGrades = g.data || [];
}

async function loadGradesForDate(date) {
  const res = await apiFetch('/api/grades?date=' + date);
  if (res?.success) grades[date] = res.data || [];
  return grades[date] || [];
}

function renderTeacherView() {
  if (currentView === 'students') { renderStudentList(); return; }
  if (currentView === 'stats') { renderTeacherStats(); return; }
  renderGradeJournal();
}

async function renderGradeJournal() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>Загрузка...</p></div>';
  const dayGrades = await loadGradesForDate(selectedDate);

  // build grade map: studentId -> grade
  const gmap = {};
  (dayGrades || []).forEach(g => { gmap[g.student_id] = g; });

  const today = new Date().toISOString().split('T')[0];
  const dayPills = schedule.map(d => {
    const cnt = (grades[d.date]||[]).length;
    return `<div class="day-btn${selectedDate===d.date?' active':''}${d.date===today&&selectedDate!==d.date?' today':''}"
      onclick="selectDate('${d.date}')">
      <div class="wd">${d.weekday}</div>
      <div class="dd">${d.label.split(' ')[0]}</div>
      <div class="mo">${d.label.split(' ')[1]||''}</div>
      <div class="cnt" style="color:${cnt>0?'var(--green)':'var(--text3)'}">${cnt>0?cnt+'/'+students.length:'—'}</div>
    </div>`;
  }).join('');

  const selDay = schedule.find(d => d.date === selectedDate);
  const rows = students.map(s => {
    const g = gmap[s.id];
    const initials = s.name.split(' ').slice(0,2).map(x=>x[0]).join('');
    const avgArr = allGrades.filter(x=>x.student_id===s.id).map(x=>x.value);
    const avg = avgArr.length ? (avgArr.reduce((a,b)=>a+b,0)/avgArr.length).toFixed(1) : '—';
    const avgColor = avg==='—'?'var(--text3)':avg>=4.5?'var(--green)':avg>=3.5?'var(--blue)':avg>=2.5?'var(--amber)':'var(--red)';
    return `<tr>
      <td><div class="student-cell">
        <div class="s-avatar" style="background:${s.class?'rgba(74,144,217,.2)':'var(--bg4)'};color:var(--blue)">${initials}</div>
        <div><div>${s.name}</div><div style="font-size:11px;color:var(--text3)">${s.class||'—'}</div></div>
      </div></td>
      <td><div style="display:flex;align-items:center;gap:8px">
        <select class="g-select" id="gs-${s.id}" onchange="previewGrade(${s.id})">
          <option value="">—</option>
          <option value="5" ${g?.value===5?'selected':''}>5</option>
          <option value="4" ${g?.value===4?'selected':''}>4</option>
          <option value="3" ${g?.value===3?'selected':''}>3</option>
          <option value="2" ${g?.value===2?'selected':''}>2</option>
        </select>
        <input class="g-input" id="gc-${s.id}" placeholder="Комментарий..." value="${g?.comment||''}" />
        <button class="save-btn" onclick="saveGrade(${s.id})">✓</button>
        ${g ? `<button class="del-btn" onclick="deleteGrade(${g.id},${s.id})" title="Удалить">✕</button>` : ''}
      </div></td>
      <td><span class="avg-chip" style="background:${avgColor}22;color:${avgColor}">${avg}</span></td>
    </tr>`;
  }).join('') || `<tr><td colspan="3" class="empty">Нет учеников. Зарегистрируйте учеников.</td></tr>`;

  // stats
  const totalSet = allGrades.length;
  const todaySet = (grades[today]||[]).length;
  const avg5 = allGrades.filter(g=>g.value===5).length;
  const allAvg = allGrades.length ? (allGrades.reduce((a,b)=>a+b.value,0)/allGrades.length).toFixed(1) : '—';

  el.innerHTML = `
  <div class="stats-grid">
    <div class="stat"><div class="lbl">Учеников</div><div class="val">${students.length}</div><div class="sub">в системе</div></div>
    <div class="stat"><div class="lbl">Средний балл</div><div class="val" style="color:var(--blue)">${allAvg}</div><div class="sub">по всем оценкам</div></div>
    <div class="stat"><div class="lbl">Всего оценок</div><div class="val">${totalSet}</div><div class="sub">${avg5} пятёрок</div></div>
  </div>
  <div class="panel-head" style="padding:0 0 10px">
    <div><div class="panel-title">Расписание · Вт / Чт / Сб</div></div>
  </div>
  <div class="schedule-strip">${dayPills}</div>
  <div class="panel">
    <div class="panel-head">
      <div>
        <div class="panel-title">Оценки за ${selDay ? selDay.weekday+', '+selDay.label : selectedDate}</div>
        <div class="panel-sub">Математика · Класс</div>
      </div>
      <button class="save-all-btn" onclick="saveAllGrades()">💾 Сохранить все</button>
    </div>
    <table><thead><tr><th>Ученик</th><th>Оценка / Комментарий</th><th>Средний</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}

async function selectDate(date) {
  selectedDate = date;
  await renderGradeJournal();
}

function previewGrade(sid) {}

async function saveGrade(studentId) {
  const valEl = document.getElementById('gs-' + studentId);
  const cmt = document.getElementById('gc-' + studentId)?.value || '';
  const val = parseInt(valEl?.value);
  if (!val) { toast('Выберите оценку', 'er'); return; }
  const res = await apiFetch('/api/grades', {
    method:'POST', body:JSON.stringify({student_id:studentId,date:selectedDate,value:val,comment:cmt,subject:'Математика'})
  });
  if (res?.success) {
    // update local cache
    if (!grades[selectedDate]) grades[selectedDate]=[];
    const idx = grades[selectedDate].findIndex(g=>g.student_id===studentId);
    if (idx>=0) grades[selectedDate][idx]=res.data;
    else grades[selectedDate].push(res.data);
    // update allGrades
    const ai = allGrades.findIndex(g=>g.student_id===studentId && g.date===selectedDate);
    if (ai>=0) allGrades[ai]=res.data; else allGrades.push(res.data);
    toast('✓ Оценка сохранена', 'ok');
    await renderGradeJournal();
  } else { toast(res?.error||'Ошибка', 'er'); }
}

async function saveAllGrades() {
  let saved = 0;
  for (const s of students) {
    const valEl = document.getElementById('gs-' + s.id);
    if (!valEl || !valEl.value) continue;
    const val = parseInt(valEl.value);
    const cmt = document.getElementById('gc-' + s.id)?.value || '';
    const res = await apiFetch('/api/grades', {
      method:'POST', body:JSON.stringify({student_id:s.id,date:selectedDate,value:val,comment:cmt,subject:'Математика'})
    });
    if (res?.success) {
      if (!grades[selectedDate]) grades[selectedDate]=[];
      const idx = grades[selectedDate].findIndex(g=>g.student_id===s.id);
      if (idx>=0) grades[selectedDate][idx]=res.data;
      else grades[selectedDate].push(res.data);
      const ai = allGrades.findIndex(g=>g.student_id===s.id && g.date===selectedDate);
      if (ai>=0) allGrades[ai]=res.data; else allGrades.push(res.data);
      saved++;
    }
  }
  toast(`✓ Сохранено ${saved} оценок`, 'ok');
  await renderGradeJournal();
}

async function deleteGrade(gradeId, studentId) {
  const res = await apiFetch('/api/grades/' + gradeId, {method:'DELETE'});
  if (res?.success) {
    grades[selectedDate] = (grades[selectedDate]||[]).filter(g=>g.id!==gradeId);
    allGrades = allGrades.filter(g=>g.id!==gradeId);
    toast('Оценка удалена', 'ok');
    await renderGradeJournal();
  } else { toast(res?.error||'Ошибка', 'er'); }
}

function renderStudentList() {
  const el = document.getElementById('main-content');
  const rows = students.map(s => {
    const sGrades = allGrades.filter(g=>g.student_id===s.id);
    const avg = sGrades.length ? (sGrades.reduce((a,b)=>a+b.value,0)/sGrades.length).toFixed(1) : '—';
    const avgColor = avg==='—'?'var(--text3)':avg>=4.5?'var(--green)':avg>=3.5?'var(--blue)':avg>=2.5?'var(--amber)':'var(--red)';
    const initials = s.name.split(' ').slice(0,2).map(x=>x[0]).join('');
    return `<tr>
      <td><div class="student-cell">
        <div class="s-avatar" style="background:rgba(74,144,217,.2);color:var(--blue)">${initials}</div>
        ${s.name}
      </div></td>
      <td><span style="font-size:12px;color:var(--text3)">${s.class||'—'}</span></td>
      <td>${sGrades.length}</td>
      <td><span class="avg-chip" style="background:${avgColor}22;color:${avgColor}">${avg}</span></td>
    </tr>`;
  }).join('') || `<tr><td colspan="4" class="empty">Нет учеников</td></tr>`;
  el.innerHTML = `
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Список учеников</div><span style="font-size:12px;color:var(--text2)">${students.length} чел.</span></div>
    <table><thead><tr><th>Имя</th><th>Класс</th><th>Оценок</th><th>Средний</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}

function renderTeacherStats() {
  const el = document.getElementById('main-content');
  const distrib = {2:0,3:0,4:0,5:0};
  allGrades.forEach(g=>{ distrib[g.value]=(distrib[g.value]||0)+1; });
  const total = allGrades.length || 1;
  const bars = [5,4,3,2].map(v => {
    const pct = Math.round(distrib[v]/total*100);
    const colors = {5:'var(--green)',4:'var(--blue)',3:'var(--amber)',2:'var(--red)'};
    return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <span class="grade-badge gb-${v}" style="flex-shrink:0">${v}</span>
      <div style="flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${colors[v]};border-radius:4px;transition:.3s"></div>
      </div>
      <span style="font-size:13px;color:var(--text2);min-width:40px">${distrib[v]} (${pct}%)</span>
    </div>`;
  }).join('');

  // by student
  const studentStats = students.map(s => {
    const sg = allGrades.filter(g=>g.student_id===s.id);
    const avg = sg.length ? (sg.reduce((a,b)=>a+b.value,0)/sg.length).toFixed(1) : null;
    return {name: s.name.split(' ')[0]+' '+s.name.split(' ')[1], avg, count: sg.length};
  }).filter(s=>s.count>0).sort((a,b)=>b.avg-a.avg);

  el.innerHTML = `
  <div class="stats-grid" style="margin-bottom:20px">
    <div class="stat"><div class="lbl">Всего оценок</div><div class="val">${allGrades.length}</div></div>
    <div class="stat"><div class="lbl">Пятёрок</div><div class="val" style="color:var(--green)">${distrib[5]}</div></div>
    <div class="stat"><div class="lbl">Двоек</div><div class="val" style="color:var(--red)">${distrib[2]}</div></div>
  </div>
  <div class="panel" style="margin-bottom:16px">
    <div class="panel-head"><div class="panel-title">Распределение оценок</div></div>
    <div style="padding:16px 18px">${bars}</div>
  </div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Успеваемость по ученикам</div></div>
    <table><thead><tr><th>Ученик</th><th>Оценок</th><th>Средний балл</th></tr></thead>
    <tbody>${studentStats.map(s => {
      const c = s.avg>=4.5?'var(--green)':s.avg>=3.5?'var(--blue)':s.avg>=2.5?'var(--amber)':'var(--red)';
      return `<tr><td>${s.name}</td><td>${s.count}</td><td><span class="avg-chip" style="background:${c}22;color:${c}">${s.avg}</span></td></tr>`;
    }).join('')||'<tr><td colspan="3" class="empty">Нет данных</td></tr>'}</tbody></table>
  </div>`;
}

// ---- STUDENT ----
async function loadStudentData() {
  const res = await apiFetch('/api/my-grades');
  if (res?.success) myGrades = res.data || [];
}

function renderStudentView() {
  if (currentView === 'stats') { renderStudentStats(); return; }
  renderMyGrades();
}

function renderMyGrades() {
  const el = document.getElementById('main-content');
  const gmap = {};
  myGrades.forEach(g => { gmap[g.date] = g; });
  const today = new Date().toISOString().split('T')[0];

  const cards = schedule.slice(0,9).map(d => {
    const g = gmap[d.date];
    const isPast = d.date <= today;
    const colors = {5:'var(--green)',4:'var(--blue)',3:'var(--amber)',2:'var(--red)'};
    return `<div class="g-card${!g?' no-grade':''}">
      <div class="g-date">${d.weekday}, ${d.label}</div>
      ${g ? `<div class="g-val" style="color:${colors[g.value]}">${g.value}</div>
      <div class="g-cmt">${g.comment||'—'}</div>`
      : `<div class="g-val">${isPast?'—':'·'}</div>
      <div class="g-cmt" style="color:var(--text3)">${isPast?'нет оценки':'предстоит'}</div>`}
    </div>`;
  }).join('');

  const hist = [...myGrades].sort((a,b)=>b.date.localeCompare(a.date)).map(g => {
    const d = new Date(g.date);
    const dd = d.getDate() + ' ' + ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()];
    return `<tr>
      <td>${dd}</td>
      <td><span class="grade-badge gb-${g.value}">${g.value}</span></td>
      <td style="color:var(--text2);font-style:italic">${g.comment||'—'}</td>
      <td style="font-size:11px;color:var(--text3)">${g.subject}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="4" class="empty">Оценок ещё нет</td></tr>';

  const avg = myGrades.length ? (myGrades.reduce((a,b)=>a+b.value,0)/myGrades.length).toFixed(1) : '—';
  const best = myGrades.length ? Math.max(...myGrades.map(g=>g.value)) : '—';

  el.innerHTML = `
  <div class="stats-grid">
    <div class="stat"><div class="lbl">Средний балл</div><div class="val" style="color:var(--blue)">${avg}</div></div>
    <div class="stat"><div class="lbl">Всего оценок</div><div class="val">${myGrades.length}</div></div>
    <div class="stat"><div class="lbl">Лучшая</div><div class="val" style="color:var(--green)">${best}</div></div>
  </div>
  <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text)">По расписанию</div>
  <div class="grades-grid">${cards}</div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">История оценок</div></div>
    <table><thead><tr><th>Дата</th><th>Оценка</th><th>Комментарий</th><th>Предмет</th></tr></thead>
    <tbody>${hist}</tbody></table>
  </div>`;
}

function renderStudentStats() {
  const el = document.getElementById('main-content');
  const distrib = {2:0,3:0,4:0,5:0};
  myGrades.forEach(g=>{ distrib[g.value]=(distrib[g.value]||0)+1; });
  const total = myGrades.length||1;
  const bars = [5,4,3,2].map(v => {
    const pct = Math.round(distrib[v]/total*100);
    const colors = {5:'var(--green)',4:'var(--blue)',3:'var(--amber)',2:'var(--red)'};
    return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <span class="grade-badge gb-${v}" style="flex-shrink:0">${v}</span>
      <div style="flex:1;height:8px;background:var(--bg3);border-radius:4px">
        <div style="height:100%;width:${pct}%;background:${colors[v]};border-radius:4px;transition:.3s"></div>
      </div>
      <span style="font-size:13px;color:var(--text2)">${distrib[v]} (${pct}%)</span>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="panel">
    <div class="panel-head"><div class="panel-title">Моя успеваемость</div></div>
    <div style="padding:18px">${bars}</div>
  </div>`;
}

// ---- PARENT ----
async function loadParentData() {
  const res = await apiFetch('/api/children');
  if (res?.success) children = res.data || [];
  if (children.length > 0 && !selectedChildId) selectedChildId = children[0].id;
}

function renderParentView() {
  if (currentView === 'children') { renderParentChildren(); return; }
  renderChildGrades();
}

async function renderChildGrades() {
  const el = document.getElementById('main-content');
  if (children.length === 0) {
    el.innerHTML = `<div class="panel">
      <div class="panel-head"><div class="panel-title">Привязать ребёнка</div></div>
      <div style="padding:18px">
        <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Введите логин ученика чтобы видеть его оценки</p>
        <div class="link-form">
          <input class="link-input" id="child-login-input" placeholder="Логин ученика" />
          <button class="link-btn" onclick="linkChild()">Привязать</button>
        </div>
      </div>
    </div>`;
    return;
  }
  const tabs = children.map(c =>
    `<button class="child-tab${selectedChildId===c.id?' active':''}" onclick="selectChild(${c.id})">${c.name.split(' ')[0]}</button>`
  ).join('');
  const child = children.find(c=>c.id===selectedChildId);
  if (!child) { el.innerHTML = '<div class="empty"><div class="ei">👧</div><p>Нет детей</p></div>'; return; }

  const res = await apiFetch('/api/child-grades/' + selectedChildId);
  const childGrades = res?.success ? (res.data||[]) : [];
  const gmap = {};
  childGrades.forEach(g => { gmap[g.date] = g; });

  const cards = schedule.slice(0,9).map(d => {
    const g = gmap[d.date];
    const colors = {5:'var(--green)',4:'var(--blue)',3:'var(--amber)',2:'var(--red)'};
    return `<div class="g-card${!g?' no-grade':''}">
      <div class="g-date">${d.weekday}, ${d.label}</div>
      ${g ? `<div class="g-val" style="color:${colors[g.value]}">${g.value}</div>
      <div class="g-cmt">${g.comment||'—'}</div>`
      : `<div class="g-val">—</div><div class="g-cmt" style="color:var(--text3)">нет оценки</div>`}
    </div>`;
  }).join('');

  const avg = childGrades.length ? (childGrades.reduce((a,b)=>a+b.value,0)/childGrades.length).toFixed(1) : '—';
  const hist = [...childGrades].sort((a,b)=>b.date.localeCompare(a.date)).map(g => {
    const d = new Date(g.date);
    const dd = d.getDate() + ' ' + ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()];
    return `<tr><td>${dd}</td><td><span class="grade-badge gb-${g.value}">${g.value}</span></td>
    <td style="color:var(--text2);font-style:italic">${g.comment||'—'}</td></tr>`;
  }).join('') || '<tr><td colspan="3" class="empty">Нет оценок</td></tr>';

  el.innerHTML = `
  <div style="margin-bottom:16px">${tabs}</div>
  <div class="stats-grid">
    <div class="stat"><div class="lbl">Средний балл</div><div class="val" style="color:var(--blue)">${avg}</div></div>
    <div class="stat"><div class="lbl">Всего оценок</div><div class="val">${childGrades.length}</div></div>
    <div class="stat"><div class="lbl">Класс</div><div class="val" style="font-size:20px">${child.class||'—'}</div></div>
  </div>
  <div style="font-size:13px;font-weight:700;margin-bottom:12px">Оценки по расписанию</div>
  <div class="grades-grid">${cards}</div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">История</div></div>
    <table><thead><tr><th>Дата</th><th>Оценка</th><th>Комментарий</th></tr></thead>
    <tbody>${hist}</tbody></table>
  </div>`;
}

function selectChild(id) {
  selectedChildId = id;
  renderChildGrades();
}

function renderParentChildren() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div class="panel" style="margin-bottom:16px">
    <div class="panel-head"><div class="panel-title">Привязать ребёнка</div></div>
    <div style="padding:16px 18px">
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Введите логин ученика для привязки</p>
      <div class="link-form">
        <input class="link-input" id="child-login-input" placeholder="Логин ученика" />
        <button class="link-btn" onclick="linkChild()">Привязать</button>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Мои дети</div></div>
    <table><thead><tr><th>Имя</th><th>Класс</th></tr></thead>
    <tbody>${children.map(c=>`<tr><td>${c.name}</td><td>${c.class||'—'}</td></tr>`).join('')||
    '<tr><td colspan="2" class="empty">Нет привязанных детей</td></tr>'}</tbody></table>
  </div>`;
}

async function linkChild() {
  const login = document.getElementById('child-login-input')?.value.trim();
  if (!login) { toast('Введите логин', 'er'); return; }
  const res = await apiFetch('/api/link-child', {
    method:'POST', body:JSON.stringify({student_login:login})
  });
  if (res?.success) {
    toast('✓ Ребёнок привязан', 'ok');
    await loadParentData();
    renderParentView();
  } else { toast(res?.error||'Ошибка', 'er'); }
}

// ---- TOAST ----
let toastTimer;
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
